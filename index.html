<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lavamex POS v2</title>

    <!-- ─── UMD Libraries (synchronous globals, available before Babel processes files) ─── -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- ─── Tailwind CSS ─── -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ─── Firebase importmap (ES module, imported once in the bootstrap script) ─── -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app":       "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore":  "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>

    <!-- ─── Babel Standalone (JSX transpilation) ─── -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .invisible-date-input::-webkit-calendar-picker-indicator {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div id="root"></div>

    <!-- ═══════════════════════════════════════════════════════════════════
         App files are loaded in DEPENDENCY ORDER.
         Each file is a non-module Babel script that adds to window.LP.
         React is available globally (window.React) via UMD above.
         Firebase functions are injected by the bootstrap module below.
         ═══════════════════════════════════════════════════════════════════ -->

    <!-- Layer 1: Constants & config -->
    <script type="text/babel" data-presets="react" src="./src/constants.js"></script>

    <!-- Layer 2: Utilities -->
    <script type="text/babel" data-presets="react" src="./src/utils.js"></script>

    <!-- Layer 3: Services -->
    <script type="text/babel" data-presets="react" src="./src/services/printService.js"></script>
    <script type="text/babel" data-presets="react" src="./src/services/pdfService.js"></script>

    <!-- Layer 4: React Context (Firebase accessed at render time via LP.firebase) -->
    <script type="text/babel" data-presets="react" src="./src/context/AppContext.jsx"></script>

    <!-- Layer 5: Primitive UI components (no inter-component deps) -->
    <script type="text/babel" data-presets="react" src="./src/components/ui/Button.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/ui/Modal.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/ui/DateRangeSelector.jsx"></script>

    <!-- Layer 6: Screen components -->
    <script type="text/babel" data-presets="react" src="./src/components/LoginScreen.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/GreeterView.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/CashierView.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/HistoryView.jsx"></script>

    <!-- Layer 7: Admin panel sub-components -->
    <script type="text/babel" data-presets="react" src="./src/components/admin/AdminCorte.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/admin/AdminNomina.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/admin/AdminAsistencia.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/admin/AdminConfig.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/admin/AdminPrecios.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/admin/AdminBusinessExpenses.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/admin/AdminMercancia.jsx"></script>
    <script type="text/babel" data-presets="react" src="./src/components/admin/AdminPanel.jsx"></script>

    <!-- Layer 8: Root app component -->
    <script type="text/babel" data-presets="react" src="./src/App.jsx"></script>

    <!-- ═══════════════════════════════════════════════════════════════════
         Bootstrap Module — imports Firebase (ES module only), initializes
         LP.db and LP.firebase, then renders the app.
         Runs AFTER all non-module babel scripts above have executed.
         ═══════════════════════════════════════════════════════════════════ -->
    <script type="text/babel" data-type="module">
        import { initializeApp, getApps, getApp } from 'firebase/app';
        import {
            getFirestore, collection, addDoc, updateDoc, doc, onSnapshot,
            query, orderBy, serverTimestamp, writeBatch, setDoc, getDocs, getDoc,
            where, deleteDoc, limit
        } from 'firebase/firestore';

        const LP = window.LP;

        // Initialize Firebase
        const app = !getApps().length ? initializeApp(LP.FIREBASE_CONFIG) : getApp();
        LP.db = getFirestore(app);

        // Expose all Firebase functions so non-module scripts can access them
        LP.firebase = {
            collection, addDoc, updateDoc, doc, onSnapshot,
            query, orderBy, serverTimestamp, writeBatch, setDoc, getDocs, getDoc,
            where, deleteDoc, limit
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            React.createElement(LP.AppProvider, null,
                React.createElement(LP.LavamexPOS, null)
            )
        );
    </script>
</body>

</html>
